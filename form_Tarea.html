<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="zAssets/css/styles.css">
    <title>Formulario Tareas</title>
</head>

<body>
    <button class="close"><img src="zAssets/img/close.png" alt="Close Button"></button>
    <div class="header_form header">
        <header>
            <h1 class="header_form">Nueva Tarea</h1>
        </header>
    </div>
    
    <h2>Añade una tarea:</h2>
    <form action="submit" id="AddTask">
        <div class="tarea_form">
            <label for="task">Tarea:</label>
            <input type="text" id="task" name="task" required>
        </div>
        <br>
        <div class="form-group">
            <label>Repetir los días</label>
            <br><br>
            <div id="days-container">
                <button type="button" class="day-btn" data-day="1">Lun</button>
                <button type="button" class="day-btn" data-day="2">Mar</button>
                <button type="button" class="day-btn" data-day="3">Mié</button>
                <button type="button" class="day-btn" data-day="4">Jue</button>
                <button type="button" class="day-btn" data-day="5">Vie</button>
                <button type="button" class="day-btn" data-day="6">Sáb</button>
                <button type="button" class="day-btn" data-day="0">Dom</button>
            </div>
        </div>
        <div class="form-group">
            <label for="categoria">Seleccione la categoria</label>
                <select name="categoria" id="categoria">
                    <option value="casa">Casa</option>
                    <option value="universidad">Universidad</option>
                    <option value="negocio">Negocio</option>
                    <option value="otro">Otro</option>
                </select>
        </div>
        <br>
        <div class="btns_form">
            <button class="btn_add_night" type="submit">Agregar Tarea</button>
            <a href="index.html"><button class="btn_add_night" type="button">Cancelar</button></a>
        </div>
    </form>

    <script src="index.js"></script>
    <script src="guardar.js"></script>
</body>
</html>
